<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Quizzly Pulse - Quiz Experience</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "outline": "#72739e",
              "surface-variant": "#dbd9ff",
              "on-error": "#ffefef",
              "on-tertiary-container": "#005d2c",
              "on-secondary-fixed": "#5d006d",
              "background": "#f8f5ff",
              "inverse-on-surface": "#9999c6",
              "surface-dim": "#d1d0ff",
              "on-surface-variant": "#575881",
              "tertiary": "#006a33",
              "surface-container": "#e8e6ff",
              "on-tertiary-fixed": "#004820",
              "error-container": "#f74b6d",
              "on-primary-fixed-variant": "#002376",
              "on-tertiary": "#cdffd3",
              "on-primary-container": "#001b61",
              "primary-dim": "#0041c7",
              "secondary-fixed-dim": "#f9a7ff",
              "tertiary-dim": "#005c2b",
              "primary-fixed": "#809bff",
              "outline-variant": "#a9a9d7",
              "on-background": "#2a2b51",
              "secondary-fixed": "#fcbcff",
              "surface": "#f8f5ff",
              "primary-fixed-dim": "#6c8cff",
              "surface-tint": "#004be2",
              "error": "#b41340",
              "tertiary-fixed": "#3fff8b",
              "surface-container-low": "#f2efff",
              "surface-container-lowest": "#ffffff",
              "surface-container-high": "#e1e0ff",
              "tertiary-container": "#3fff8b",
              "on-secondary": "#ffeefb",
              "primary": "#004be2",
              "on-error-container": "#510017",
              "primary-container": "#809bff",
              "surface-container-highest": "#dbd9ff",
              "error-dim": "#a70138",
              "secondary-dim": "#89089e",
              "inverse-primary": "#6889ff",
              "secondary": "#9720ab",
              "inverse-surface": "#08082f",
              "on-surface": "#2a2b51",
              "secondary-container": "#fcbcff",
              "on-primary": "#f2f1ff",
              "on-secondary-fixed-variant": "#8a0b9f",
              "on-secondary-container": "#7c0091",
              "surface-bright": "#f8f5ff",
              "on-primary-fixed": "#000000",
              "tertiary-fixed-dim": "#24f07e",
              "on-tertiary-fixed-variant": "#006832"
            },
            fontFamily: {
              "headline": ["Plus Jakarta Sans"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .glass-effect {
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
      }
    </style>
</head>
<body class="bg-background text-on-surface font-body selection:bg-primary-container selection:text-on-primary-container min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="bg-[#f8f5ff] dark:bg-slate-950/80 backdrop-blur-xl docked full-width top-0 sticky z-50 shadow-[0_32px_32px_-12px_rgba(42,43,81,0.06)]">
<nav class="flex justify-between items-center w-full px-6 py-4 max-w-7xl mx-auto">
<div class="flex items-center gap-8">
<span class="text-2xl font-black italic bg-gradient-to-br from-[#004be2] to-[#809bff] bg-clip-text text-transparent font-['Plus_Jakarta_Sans'] tracking-tight">Quizzly Pulse</span>
<div class="hidden md:flex gap-6 items-center">
<a class="text-[#2a2b51] dark:text-slate-400 font-medium hover:text-[#9720ab] transition-colors duration-300" href="#">Home</a>
<a class="text-[#2a2b51] dark:text-slate-400 font-medium hover:text-[#9720ab] transition-colors duration-300" href="#">Leaderboard</a>
</div>
</div>
<div class="flex items-center gap-4">
<button class="p-2 rounded-full hover:bg-surface-container transition-colors active:scale-95 transition-transform">
<span class="material-symbols-outlined text-[#004be2]" data-icon="account_circle">account_circle</span>
</button>
<button class="p-2 rounded-full hover:bg-surface-container transition-colors active:scale-95 transition-transform">
<span class="material-symbols-outlined text-[#2a2b51]" data-icon="settings">settings</span>
</button>
</div>
</nav>
</header>
<main class="flex-grow flex items-center justify-center px-4 py-12 relative overflow-hidden">
<!-- Abstract Background Elements -->
<div class="absolute top-[-10%] right-[-10%] w-[400px] h-[400px] bg-primary-container/20 rounded-full blur-[100px] -z-10"></div>
<div class="absolute bottom-[-10%] left-[-10%] w-[300px] h-[300px] bg-secondary-container/20 rounded-full blur-[80px] -z-10"></div>
<div class="w-full max-w-4xl flex flex-col gap-8">
<!-- Header Progress & Timer -->
<div class="flex flex-col md:flex-row justify-between items-end md:items-center gap-4 px-2">
<div class="flex flex-col gap-2 w-full md:w-64">
<div class="flex justify-between items-baseline">
<span class="font-headline text-primary font-extrabold text-xl">Question 04</span>
<span class="font-label text-on-surface-variant text-sm font-semibold tracking-widest uppercase">of 10</span>
</div>
<div class="h-2 w-full bg-surface-container-highest rounded-full overflow-hidden">
<div class="h-full w-2/5 bg-gradient-to-r from-secondary to-secondary-fixed-dim rounded-full"></div>
</div>
</div>
<div class="flex items-center gap-6 bg-surface-container-low px-6 py-3 rounded-full shadow-sm">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-secondary" data-icon="timer">timer</span>
<span class="font-headline font-bold text-2xl text-on-surface tabular-nums">24s</span>
</div>
<div class="w-px h-6 bg-outline-variant/30"></div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-tertiary" data-icon="bolt">bolt</span>
<span class="font-headline font-bold text-2xl text-on-surface">1,420</span>
</div>
</div>
</div>
<!-- Central Question Card -->
<div class="bg-surface-container-low rounded-lg p-10 md:p-16 relative shadow-lg overflow-hidden">
<!-- Decorative element -->
<div class="absolute top-0 right-0 p-4 opacity-10">
<span class="material-symbols-outlined text-[120px]" data-icon="quiz">quiz</span>
</div>
<div class="relative z-10 flex flex-col gap-6">
<div class="inline-flex items-center gap-2 bg-surface-container-highest self-start px-4 py-1 rounded-full text-on-surface-variant">
<span class="material-symbols-outlined text-[18px]" data-icon="category">category</span>
<span class="font-label text-xs font-bold uppercase tracking-wider">Quantum Physics</span>
</div>
<h1 class="font-headline text-3xl md:text-4xl font-bold text-on-surface leading-tight">
                        Which subatomic particle is famously associated with the concept of "spooky action at a distance"?
                    </h1>
</div>
</div>
<!-- Answers Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<!-- Option 1 -->
<button class="group relative flex items-center justify-between p-6 bg-surface-container-lowest hover:bg-primary transition-all duration-300 rounded-md text-left active:scale-[0.98]">
<div class="flex items-center gap-4">
<span class="flex items-center justify-center w-10 h-10 rounded-full bg-surface-container-high group-hover:bg-primary-container text-on-surface-variant group-hover:text-on-primary-container font-headline font-black text-lg transition-colors">A</span>
<span class="font-body text-lg font-medium text-on-surface group-hover:text-on-primary transition-colors">The Electron</span>
</div>
<span class="material-symbols-outlined opacity-0 group-hover:opacity-100 text-on-primary transition-opacity" data-icon="arrow_forward">arrow_forward</span>
</button>
<!-- Option 2 (Active/Selected State Simulation) -->
<button class="group relative flex items-center justify-between p-6 bg-primary rounded-md text-left shadow-md">
<div class="flex items-center gap-4">
<span class="flex items-center justify-center w-10 h-10 rounded-full bg-primary-container text-on-primary-container font-headline font-black text-lg">B</span>
<span class="font-body text-lg font-medium text-on-primary">The Photon</span>
</div>
<span class="material-symbols-outlined text-on-primary" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</button>
<!-- Option 3 -->
<button class="group relative flex items-center justify-between p-6 bg-surface-container-lowest hover:bg-primary transition-all duration-300 rounded-md text-left active:scale-[0.98]">
<div class="flex items-center gap-4">
<span class="flex items-center justify-center w-10 h-10 rounded-full bg-surface-container-high group-hover:bg-primary-container text-on-surface-variant group-hover:text-on-primary-container font-headline font-black text-lg transition-colors">C</span>
<span class="font-body text-lg font-medium text-on-surface group-hover:text-on-primary transition-colors">The Neutrino</span>
</div>
<span class="material-symbols-outlined opacity-0 group-hover:opacity-100 text-on-primary transition-opacity" data-icon="arrow_forward">arrow_forward</span>
</button>
<!-- Option 4 -->
<button class="group relative flex items-center justify-between p-6 bg-surface-container-lowest hover:bg-primary transition-all duration-300 rounded-md text-left active:scale-[0.98]">
<div class="flex items-center gap-4">
<span class="flex items-center justify-center w-10 h-10 rounded-full bg-surface-container-high group-hover:bg-primary-container text-on-surface-variant group-hover:text-on-primary-container font-headline font-black text-lg transition-colors">D</span>
<span class="font-body text-lg font-medium text-on-surface group-hover:text-on-primary transition-colors">The Quark</span>
</div>
<span class="material-symbols-outlined opacity-0 group-hover:opacity-100 text-on-primary transition-opacity" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
<!-- Action Bar -->
<div class="flex justify-between items-center mt-4">
<button class="flex items-center gap-2 px-6 py-3 text-on-surface-variant hover:text-error transition-colors font-semibold group">
<span class="material-symbols-outlined group-hover:rotate-12 transition-transform" data-icon="exit_to_app">exit_to_app</span>
                    Quit Quiz
                </button>
<div class="flex items-center gap-4">
<button class="px-8 py-3 text-on-surface font-semibold hover:bg-surface-container-high rounded-full transition-colors">
                        Skip
                    </button>
<button class="px-10 py-4 bg-gradient-to-br from-primary to-primary-container text-on-primary font-bold rounded-md shadow-lg shadow-primary/20 hover:shadow-primary/40 active:scale-95 transition-all">
                        Submit Answer
                    </button>
</div>
</div>
</div>
</main>
<!-- Footer -->
<footer class="bg-[#f2efff] dark:bg-slate-900 full-width py-12 mt-auto">
<div class="flex flex-col md:flex-row justify-between items-center px-8 max-w-7xl mx-auto gap-6 font-['Inter'] text-sm tracking-wide">
<div class="flex flex-col items-center md:items-start gap-2">
<span class="font-['Plus_Jakarta_Sans'] font-bold text-[#2a2b51] dark:text-white">Quizzly Pulse</span>
<p class="text-[#2a2b51]/60 dark:text-slate-500">© 2024 Quizzly Pulse. Elevate your intellect.</p>
</div>
<div class="flex gap-8">
<a class="text-[#2a2b51]/60 dark:text-slate-500 hover:text-[#004be2] underline decoration-2 underline-offset-4 transition-all duration-200" href="#">Privacy</a>
<a class="text-[#2a2b51]/60 dark:text-slate-500 hover:text-[#004be2] underline decoration-2 underline-offset-4 transition-all duration-200" href="#">Terms</a>
<a class="text-[#2a2b51]/60 dark:text-slate-500 hover:text-[#004be2] underline decoration-2 underline-offset-4 transition-all duration-200" href="#">Support</a>
<a class="text-[#2a2b51]/60 dark:text-slate-500 hover:text-[#004be2] underline decoration-2 underline-offset-4 transition-all duration-200" href="#">Admin</a>
</div>
</div>
</footer>
</body></html>
