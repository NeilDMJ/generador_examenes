<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login | Quizzly Pulse</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "outline": "#72739e",
                        "surface-variant": "#dbd9ff",
                        "on-error": "#ffefef",
                        "on-tertiary-container": "#005d2c",
                        "on-secondary-fixed": "#5d006d",
                        "background": "#f8f5ff",
                        "inverse-on-surface": "#9999c6",
                        "surface-dim": "#d1d0ff",
                        "on-surface-variant": "#575881",
                        "tertiary": "#006a33",
                        "surface-container": "#e8e6ff",
                        "on-tertiary-fixed": "#004820",
                        "error-container": "#f74b6d",
                        "on-primary-fixed-variant": "#002376",
                        "on-tertiary": "#cdffd3",
                        "on-primary-container": "#001b61",
                        "primary-dim": "#0041c7",
                        "secondary-fixed-dim": "#f9a7ff",
                        "tertiary-dim": "#005c2b",
                        "primary-fixed": "#809bff",
                        "outline-variant": "#a9a9d7",
                        "on-background": "#2a2b51",
                        "secondary-fixed": "#fcbcff",
                        "surface": "#f8f5ff",
                        "primary-fixed-dim": "#6c8cff",
                        "surface-tint": "#004be2",
                        "error": "#b41340",
                        "tertiary-fixed": "#3fff8b",
                        "surface-container-low": "#f2efff",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-high": "#e1e0ff",
                        "tertiary-container": "#3fff8b",
                        "on-secondary": "#ffeefb",
                        "primary": "#004be2",
                        "on-error-container": "#510017",
                        "primary-container": "#809bff",
                        "surface-container-highest": "#dbd9ff",
                        "error-dim": "#a70138",
                        "secondary-dim": "#89089e",
                        "inverse-primary": "#6889ff",
                        "secondary": "#9720ab",
                        "inverse-surface": "#08082f",
                        "on-surface": "#2a2b51",
                        "secondary-container": "#fcbcff",
                        "on-primary": "#f2f1ff",
                        "on-secondary-fixed-variant": "#8a0b9f",
                        "on-secondary-container": "#7c0091",
                        "surface-bright": "#f8f5ff",
                        "on-primary-fixed": "#000000",
                        "tertiary-fixed-dim": "#24f07e",
                        "on-tertiary-fixed-variant": "#006832"
                    },
                    fontFamily: {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f5ff;
        }
        .bg-kinetic {
            background: radial-gradient(circle at 0% 0%, #f2efff 0%, transparent 50%),
                        radial-gradient(circle at 100% 100%, #dbd9ff 0%, transparent 50%);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col bg-kinetic">
<!-- TopAppBar Suppressed for Transactional Screen (Login) -->
<main class="flex-grow flex items-center justify-center px-6 py-12">
<div class="w-full max-w-md">
<!-- Brand Anchor -->
<div class="text-center mb-10">
<div class="inline-flex items-center justify-center p-4 mb-4 bg-surface-container rounded-lg">
<span class="material-symbols-outlined text-primary text-4xl" data-icon="bolt" style="font-variation-settings: 'FILL' 1;">bolt</span>
</div>
<h1 class="text-3xl font-headline font-black italic bg-gradient-to-br from-[#004be2] to-[#809bff] bg-clip-text text-transparent tracking-tight">
                    Quizzly Pulse
                </h1>
<p class="text-on-surface-variant font-body mt-2">Elevate your intellect through lightning speed trivia.</p>
</div>
<!-- Login Card -->
<div class="bg-surface-container-lowest p-8 md:p-10 rounded-lg shadow-[0_32px_64px_-12px_rgba(42,43,81,0.08)] relative overflow-hidden">
<!-- Decorative element -->
<div class="absolute top-0 right-0 w-32 h-32 bg-primary-container/10 rounded-full -mr-16 -mt-16"></div>
<div class="relative">
<h2 class="text-2xl font-headline font-bold text-on-surface mb-8">Welcome Back</h2>
<form class="space-y-6">
<div class="space-y-2">
<label class="block text-sm font-label font-semibold text-on-surface/80 uppercase tracking-wider pl-1">Email Address</label>
<input class="w-full px-5 py-4 bg-surface-container-low border-none rounded-md focus:ring-2 focus:ring-primary text-on-surface placeholder:text-outline-variant transition-all" placeholder="name@example.com" type="email"/>
</div>
<div class="space-y-2">
<div class="flex justify-between items-center pl-1">
<label class="block text-sm font-label font-semibold text-on-surface/80 uppercase tracking-wider">Password</label>
<a class="text-xs font-label font-medium text-primary hover:text-secondary transition-colors" href="#">Forgot password?</a>
</div>
<input class="w-full px-5 py-4 bg-surface-container-low border-none rounded-md focus:ring-2 focus:ring-primary text-on-surface placeholder:text-outline-variant transition-all" placeholder="••••••••" type="password"/>
</div>
<button class="w-full py-4 bg-gradient-to-r from-primary to-primary-container text-on-primary font-headline font-bold rounded-md shadow-lg shadow-primary/20 hover:shadow-xl hover:scale-[1.02] active:scale-95 transition-all duration-300" type="submit">
                            Log In
                        </button>
</form>
<div class="relative my-10">
<div class="absolute inset-0 flex items-center">
<div class="w-full h-px bg-outline-variant/20"></div>
</div>
<div class="relative flex justify-center text-xs uppercase tracking-widest">
<span class="bg-surface-container-lowest px-4 text-outline-variant font-semibold">Or continue with</span>
</div>
</div>
<!-- Social Logins -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-3 py-3 px-4 bg-surface-container-low hover:bg-surface-container-high text-on-surface rounded-md font-label font-medium transition-all group">
<span class="material-symbols-outlined text-xl group-hover:scale-110 transition-transform" data-icon="google">google</span>
<span>Google</span>
</button>
<button class="flex items-center justify-center gap-3 py-3 px-4 bg-surface-container-low hover:bg-surface-container-high text-on-surface rounded-md font-label font-medium transition-all group">
<span class="material-symbols-outlined text-xl group-hover:scale-110 transition-transform" data-icon="terminal">terminal</span>
<span>GitHub</span>
</button>
</div>
</div>
</div>
<!-- Toggle Auth -->
<p class="text-center mt-8 font-body text-on-surface-variant">
                Don't have an account? 
                <a class="text-primary font-bold hover:text-secondary underline underline-offset-4 decoration-2 transition-all" href="#">Sign up for free</a>
</p>
</div>
</main>
<!-- Shared Footer Component -->
<footer class="bg-[#f2efff] dark:bg-slate-900 full-width py-12 mt-auto">
<div class="flex flex-col md:flex-row justify-between items-center px-8 max-w-7xl mx-auto gap-6">
<div class="flex flex-col items-center md:items-start gap-2">
<span class="font-['Plus_Jakarta_Sans'] font-bold text-[#2a2b51] dark:text-white">Quizzly Pulse</span>
<p class="font-['Inter'] text-sm tracking-wide text-[#2a2b51]/60 dark:text-slate-500">© 2024 Quizzly Pulse. Elevate your intellect.</p>
</div>
<nav class="flex flex-wrap justify-center gap-8">
<a class="font-['Inter'] text-sm tracking-wide text-[#2a2b51]/60 dark:text-slate-500 hover:text-[#004be2] underline decoration-2 underline-offset-4 transition-all duration-200" href="#">Privacy</a>
<a class="font-['Inter'] text-sm tracking-wide text-[#2a2b51]/60 dark:text-slate-500 hover:text-[#004be2] underline decoration-2 underline-offset-4 transition-all duration-200" href="#">Terms</a>
<a class="font-['Inter'] text-sm tracking-wide text-[#2a2b51]/60 dark:text-slate-500 hover:text-[#004be2] underline decoration-2 underline-offset-4 transition-all duration-200" href="#">Support</a>
<a class="font-['Inter'] text-sm tracking-wide text-[#2a2b51]/60 dark:text-slate-500 hover:text-[#004be2] underline decoration-2 underline-offset-4 transition-all duration-200" href="#">Admin</a>
</nav>
</div>
</footer>
<!-- Abstract Background Elements -->
<div class="fixed top-0 left-0 w-full h-full pointer-events-none -z-10 opacity-40">
<div class="absolute top-[10%] left-[5%] w-64 h-64 bg-primary/10 rounded-full blur-3xl"></div>
<div class="absolute bottom-[10%] right-[5%] w-96 h-96 bg-secondary/10 rounded-full blur-3xl"></div>
</div>
</body></html>
